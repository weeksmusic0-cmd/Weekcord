<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekCord | Arkadaş Ortamı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="fade-in">
        <div class="auth-box">
            <h2>WeekCord</h2>
            <p>Sohbetin yeni adresi.</p>
            
            <span class="auth-label">Kullanıcı Adı</span>
            <input type="text" id="usernameInput" placeholder="Kullanıcı adınızı girin">
            
            <span class="auth-label">Şifre</span>
            <input type="password" id="passwordInput" placeholder="Şifrenizi girin">
            
            <button id="loginBtn">Giriş Yap</button>
            <span class="register-link" id="registerBtn">Hala bir hesabın yok mu? Kayıt Ol</span>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header"><h3>Sohbetler</h3></div>
            <div class="friend-add-box">
                <input type="text" id="addFriendInput" placeholder="Kullanıcı ara...">
                <button id="addFriendBtn">Ekle</button>
            </div>
            
            <div class="friend-list" id="friendListContainer"></div>
            
            <div class="user-panel">
                <div class="user-info">
                    <div class="friend-avatar" id="myAvatar">?</div>
                    <strong id="myUsernameDisplay">...</strong>
                </div>
                <div class="voice-controls">
                    <button id="muteBtn" title="Mikrofonu Kapat">🎤</button>
                    <button id="deafenBtn" title="Sağırlaştır">🎧</button>
                    <button id="logoutBtn" title="Çıkış Yap">🚪</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <span id="currentChatName">Bir sohbet seçin</span>
                <button class="call-btn" id="startCallBtn" style="display:none;">📞 Sesli Ara</button>
            </div>
            
            <div class="messages" id="messagesContainer">
                <div id="welcome-message" style="text-align:center; color:#72767d; margin-top:50px;">
                    <h3>Sohbete Hoş Geldin!</h3>
                    <p>Mesajlaşmaya başlamak için sol taraftan birini seç.</p>
                </div>
            </div>

            <div id="bot-options-container" style="display:none;"></div>

            <div class="chat-input" id="chatInputWrapper">
                <form id="chatForm">
                    <input type="text" id="messageInput" placeholder="Mesaj göndermek için bir sohbet seçin" autocomplete="off">
                </form>
            </div>
        </div>
    </div>

    <div id="call-overlay" class="fade-in" style="display: none;">
        <div class="call-avatar" id="callMyAvatar">W</div>
        <h2 style="color:white; margin-top:20px;" id="callStatusText">Aranıyor...</h2>
        <button class="end-call-btn" id="endCallBtn" style="margin-top:30px;">📞 Kapat</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
