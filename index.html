<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekCord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>WeekCord</h2>
            <input type="text" id="usernameInput" placeholder="Kullanıcı Adı">
            <input type="password" id="passwordInput" placeholder="Şifre">
            <button id="loginBtn">Giriş Yap</button>
            <button id="registerBtn" class="secondary">Kayıt Ol</button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">Çevrimiçi Arkadaşlar</div>
            <div class="friend-add-box">
                <input type="text" id="addFriendInput" placeholder="Kullanıcı adı...">
                <button id="addFriendBtn">Ekle</button>
            </div>
            <div class="friend-list" id="friendListContainer"></div>
            <div class="user-panel">
                <div class="user-info">
                    <div class="friend-avatar" id="myAvatar">?</div>
                    <strong id="myUsernameDisplay">...</strong>
                </div>
                <div class="voice-controls">
                    <button id="muteBtn">🎤</button>
                    <button id="deafenBtn">🎧</button>
                    <button id="logoutBtn">🚪</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <span id="currentChatName">Sohbet Seçin</span>
                <button class="call-btn" id="startCallBtn" style="display: none;">📞 Sesli Ara</button>
            </div>
            
            <div id="emptyFriendsScreen" class="empty-state">
                <h2>Hiç arkadaşın yok...</h2>
                <p>Ama bir seçeneğin var!</p>
                <div class="bot-add-card">
                    <div class="friend-avatar" style="background:#1abc9c;">W</div>
                    <div>
                        <strong>Week Bot <span class="bot-tag">BOT</span></strong>
                        <div style="font-size:12px; color:#b9bbbe;">Sohbet etmek için hazır.</div>
                    </div>
                    <button id="addWeekBotBtn" class="add-bot-btn">Arkadaş Ekle</button>
                </div>
            </div>

            <div class="messages" id="messagesContainer" style="display: none;"></div>
            <div id="botOptionsContainer" class="bot-options-container" style="display: none;"></div>
            
            <div class="chat-input" id="chatInputContainer" style="display: none;">
                <form id="chatForm">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz..." autocomplete="off">
                </form>
            </div>
        </div>
    </div>

    <div id="notification-container" class="notification-container"></div>
    <audio id="remoteAudio" autoplay></audio>

    <div id="call-overlay" style="display: none;">
        <div class="call-avatar speaking" id="callMyAvatar">?</div>
        <h2 id="callStatusText" style="color:white; margin-top:20px;">Arama...</h2>
        <button class="end-call-btn" id="endCallBtn">📞 Kapat</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
